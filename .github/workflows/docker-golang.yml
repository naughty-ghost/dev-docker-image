name: docker.golang

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/docker-golang.yml
      - golang/**
  schedule:
    - cron: "0 0 * * 0"

env:
  REGISTRY: ghcr.io
  REPOSITORY: ${{ github.repository }}
  IMAGE: golang

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    defaults:
      run:
        working-directory: golang

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download release tool
        run: |
          wget -q https://github.com/naughty-ghost/release-tool/releases/download/v2.0.0/release-tool.zip -O release-tool.zip
          unzip release-tool.zip

      - name: Extract Docker metadata
        id: meta
        run: |
          echo "tag=ghcr.io/$REPOSITORY-$IMAGE:$(./release-tool | tr -d '\n')" >> $GITHUB_OUTPUT
          {
            echo "description<<EOF"
            ./release-tool -r latest
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        env:
          DESCRIPTION: ${{ steps.meta.outputs.description }}
        run: |
          docker buildx create --use
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag ${{ steps.meta.outputs.tag }} \
            --label "org.opencontainers.image.description=${DESCRIPTION}" \
            --push .

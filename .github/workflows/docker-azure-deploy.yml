name: docker.azure-deploy

on:
  schedule:
    # 毎週月曜日の0時(JST)に実行
    - cron: "0 15 * * 0"
  push:
    branches:
      - main
    paths:
      - .github/workflows/docker-azure-deploy.yml
      - azure-deploy/**

env:
  # Format
  REGISTRY: ghcr.io
  REPOSITORY: ${{ github.repository }}
  IMAGE: azure-deploy

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    defaults:
      run:
        working-directory: azure-deploy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # https://github.com/docker/setup-buildx-action
      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v4
      # https://github.com/docker/setup-qemu-action
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download release tool
        run: |
          wget -q https://github.com/naughty-ghost/release-tool/releases/download/v2.0.0/release-tool.zip -O release-tool.zip
          unzip release-tool.zip

      - name: Extract Docker metadata
        id: meta
        run: |
          echo "tag=ghcr.io/$REPOSITORY-$IMAGE:$(./release-tool | tr -d '\n')" >> $GITHUB_OUTPUT
          {
            echo "description<<EOF"
            ./release-tool -r latest
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        env:
          DESCRIPTION: ${{ steps.meta.outputs.description }}
        run: |
          docker buildx create --use
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag ${{ steps.meta.outputs.tag }} \
            --label "org.opencontainers.image.description=${DESCRIPTION}" \
            --push .
